version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: financeapp-db
    environment:
      POSTGRES_DB: financeapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financeapp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financeapp-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/financeapp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - financeapp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financeapp-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - financeapp-network

volumes:
  postgres_data:

networks:
  financeapp-network:
    driver: bridge
